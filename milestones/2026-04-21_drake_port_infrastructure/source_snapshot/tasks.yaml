  # Task 1: Standard Pushing
  # -----------------------------------------------------------------------
  pushing:
    object_type: box
    link_name: box_link
    mass: 0.2
    friction: 0.4
    size: [0.1, 0.1, 0.1]
    init_xyz: [0.0, 0.0, 0.05]
    goal_xy:  [0.3, 0.0]
    color_rgba: [0.8, 0.2, 0.2, 1.0]
    cost:
      w_obj_xy:    100000.0
      w_obj_z:         10.0
      w_box_z:        100.0
      w_box_rp:        50.0
      w_terminal:       5.0
      z_ee_target:      0.05
      d_push:           0.05
      w_ee_approach: 8000.0
      w_torque:         0.01

